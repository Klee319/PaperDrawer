# ==============================================
# PaperDrawers レシピ設定 / Recipe Configuration
# ==============================================
# shape: Shaped recipe pattern (3 rows, 3 chars each)
# ingredients: Material mapping for shape characters
# enabled: Whether this recipe is active

recipes:
  drawer-key:
    enabled: true
    result-amount: 3
    shape:
      - " G "
      - " S "
      - " S "
    ingredients:
      G: GOLD_NUGGET
      S: STICK
  tier-1:
    enabled: true
    shape:
      - "PPP"
      - "PCP"
      - "PPP"
    ingredients:
      P: TAG_PLANKS
      C: CHEST
  tier-2:
    enabled: true
    shape:
      - " I "
      - "IDI"
      - " I "
    ingredients:
      I: COPPER_INGOT
      D: PAPER_DRAWERS_TIER_1  # Special: references a drawer tier
  tier-3:
    enabled: true
    shape:
      - " I "
      - "IDI"
      - " I "
    ingredients:
      I: IRON_INGOT
      D: PAPER_DRAWERS_TIER_2
  tier-4:
    enabled: true
    shape:
      - " I "
      - "IDI"
      - " I "
    ingredients:
      I: GOLD_INGOT
      D: PAPER_DRAWERS_TIER_3
  tier-5:
    enabled: true
    shape:
      - " I "
      - "IDI"
      - " I "
    ingredients:
      I: DIAMOND
      D: PAPER_DRAWERS_TIER_4
  tier-6:
    enabled: true
    shape:
      - " I "
      - "IDI"
      - " I "
    ingredients:
      I: NETHERITE_INGOT
      D: PAPER_DRAWERS_TIER_5
  tier-7:
    enabled: false
    shape:
      - "NNN"
      - "NDN"
      - "NNN"
    ingredients:
      N: NETHER_STAR
      D: PAPER_DRAWERS_TIER_6
  void:
    enabled: true
    shape:
      - "OEO"
      - "ECE"
      - "OEO"
    ingredients:
      O: OBSIDIAN
      E: ENDER_PEARL
      C: CHEST
  # 仕分けドロワーレシピ / Sorting drawer recipe
  # どのティアのドロワーでも仕分けドロワーに変換可能（入力ティアが維持される）
  # D にはどのティアのドロワーでも配置可能
  sorting:
    enabled: true
    shape:
      - " C "
      - " D "
      - " H "
    ingredients:
      C: COMPARATOR
      D: PAPER_DRAWERS_TIER_1
      H: HOPPER
